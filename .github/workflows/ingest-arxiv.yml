name: Ingest arXiv papers

on:
  workflow_dispatch:
    inputs:
      categories:
        description: "Comma-separated arXiv categories"
        required: false
        default: "cs.AI,cs.CL,cs.CR,cs.CC,cs.DS,cs.LG,cs.LO,cs.PL,cs.SE,cs.SY"
      max_results:
        description: "Maximum papers to fetch in this run"
        required: false
        default: "25"
      dry_run:
        description: "Fetch and report importable papers without writing"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 4 * * *"

jobs:
  ingest-arxiv:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ARXIV_CATEGORIES: ${{ github.event.inputs.categories || vars.ARXIV_CATEGORIES || 'cs.AI,cs.CL,cs.CR,cs.CC,cs.DS,cs.LG,cs.LO,cs.PL,cs.SE,cs.SY' }}
      ARXIV_MAX_RESULTS: ${{ github.event.inputs.max_results || vars.ARXIV_MAX_RESULTS || '25' }}
      ARXIV_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      ARXIV_USER_AGENT: ${{ vars.ARXIV_USER_AGENT || 'PaperDeck/0.1.0 (https://paperdeck.michaelpiccirilli.it)' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest arXiv papers
        id: ingest
        shell: bash
        run: |
          cmd=(npm run ingest:arxiv)

          if [ "$ARXIV_DRY_RUN" = "true" ]; then
            cmd+=(-- --dry-run)
          fi

          output=$("${cmd[@]}" 2>&1 | tee /dev/stderr | tail -1)
          echo "output=$output" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        shell: bash
        run: |
          cat << 'JQSCRIPT' > /tmp/format-summary.jq
          def modeLabel: if .mode == "dry-run" then "🔍 Dry run" elif .mode == "dry-run-backfill" then "🔍 Dry run (backfill)" elif .mode == "write-backfill" then "📥 Write (backfill)" else "📥 Write" end;
          def countBadge($n): if $n > 0 then "**\($n)**" else "0" end;

          "## arXiv Ingestion · \(modeLabel)", "", "| Category | Fetched | Importable | Skipped |", "|----------|---------|------------|---------|",
          (.categoryBreakdown // []) | map("| \(.category) | \(countBadge(.fetched)) | \(countBadge(.importable)) | \(.skipped) |") | join("\n"),
          "", "**Total:** fetched **\(.fetched)**, importable **\(.importable)**", "",
          if .firstPaper then "First paper: `\(.firstPaper)`" else "" end,
          if (.categoryBreakdown // []) | any(.cursorHint) then "", "### Cursor decisions", "", (.categoryBreakdown | map("| \(.category) | cursor at \(.cursorHint) | first \(.firstFetched) | last \(.lastFetched) |") | [ "| Category | Cursor | First fetched | Last fetched |", "|----------|--------|---------------|--------------|" ] + . | join("\n")) else "" end
          JQSCRIPT

          output='${{ steps.ingest.outputs.output }}'
          if [ -n "$output" ]; then
            echo "$output" | jq -r -f /tmp/format-summary.jq >> "$GITHUB_STEP_SUMMARY"
          fi

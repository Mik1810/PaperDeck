name: Ingest arXiv papers

on:
  workflow_dispatch:
    inputs:
      categories:
        description: "Comma-separated arXiv categories"
        required: false
        default: "cs.AI,cs.CL,cs.CR,cs.CC,cs.DS,cs.LG,cs.LO,cs.PL,cs.SE,cs.SY"
      max_results:
        description: "Maximum papers to fetch in this run"
        required: false
        default: "25"
      dry_run:
        description: "Fetch and report importable papers without writing"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ingest-arxiv:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ARXIV_CATEGORIES: ${{ github.event.inputs.categories || vars.ARXIV_CATEGORIES || 'cs.AI,cs.CL,cs.CR,cs.CC,cs.DS,cs.LG,cs.LO,cs.PL,cs.SE,cs.SY' }}
      ARXIV_MAX_RESULTS: ${{ github.event.inputs.max_results || vars.ARXIV_MAX_RESULTS || '25' }}
      ARXIV_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      ARXIV_USER_AGENT: ${{ vars.ARXIV_USER_AGENT || 'PaperDeck/0.1.0 (https://paperdeck.michaelpiccirilli.it)' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest arXiv papers
        id: ingest
        shell: bash
        run: |
          cmd=(npm run ingest:arxiv)

          if [ "$ARXIV_DRY_RUN" = "true" ]; then
            cmd+=(-- --dry-run)
          fi

          output=$("${cmd[@]}" 2>&1 | tee /dev/stderr | tail -1)
          echo "output=$output" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        shell: bash
        env:
          INGEST_OUTPUT: ${{ steps.ingest.outputs.output }}
        run: |
          python3 << 'PYSCRIPT' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os

          raw = os.environ.get("INGEST_OUTPUT", "").strip()
          if not raw:
              raise SystemExit(0)

          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              raise SystemExit(0)

          mode_labels = {
              "dry-run": "🔍 Dry run",
              "dry-run-backfill": "🔍 Dry run (backfill)",
              "write-backfill": "📥 Write (backfill)",
          }
          mode = mode_labels.get(data.get("mode"), "📥 Write")

          def badge(n):
              return f"**{n}**" if isinstance(n, (int, float)) and n > 0 else "0"

          breakdown = data.get("categoryBreakdown") or []
          lines = [
              f"## arXiv Ingestion · {mode}",
              "",
              "| Category | Fetched | Importable | Skipped |",
              "|----------|---------|------------|---------|",
          ]
          for item in breakdown:
              lines.append(
                  f"| {item.get('category')} | {badge(item.get('fetched'))} "
                  f"| {badge(item.get('importable'))} | {item.get('skipped')} |"
              )

          importable = data.get("importable", data.get("imported"))
          lines += ["", f"**Total:** fetched **{data.get('fetched')}**, importable **{importable}**", ""]

          if data.get("firstPaper"):
              lines.append(f"First paper: `{data['firstPaper']}`")

          if any(item.get("cursorHint") for item in breakdown):
              lines += ["", "### Cursor decisions", ""]
              lines.append("| Category | Cursor | First fetched | Last fetched |")
              lines.append("|----------|--------|---------------|--------------|")
              for item in breakdown:
                  lines.append(
                      f"| {item.get('category')} | cursor at {item.get('cursorHint')} "
                      f"| first {item.get('firstFetched')} | last {item.get('lastFetched')} |"
                  )

          print("\n".join(lines))
          PYSCRIPT

name: App CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  app-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_replace_me' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_replace_me' }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /feed
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /onboarding
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL || '' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || '' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
      PAPERDECK_E2E_DEV_AUTH: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit service-role boundaries
        run: npm run audit:service-role

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Report E2E data availability
        shell: bash
        run: |
          is_configured() {
            [[ -n "$1" && "$1" != "replace_me" && "$1" != "dummy" && "$1" != *"replace-me"* ]]
          }

          if is_configured "$NEXT_PUBLIC_SUPABASE_URL" && is_configured "$SUPABASE_SERVICE_ROLE_KEY"; then
            echo "Supabase-backed Playwright smoke tests will run."
          else
            echo "::notice::Supabase secrets are not configured; Supabase-backed Playwright smoke tests will be skipped by test guards."
          fi

      - name: Playwright smoke tests
        run: npm run test:e2e

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## App CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| service-role audit | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| lint | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| build | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| e2e smoke tests | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*All checks pass. Ready to deploy.*" >> "$GITHUB_STEP_SUMMARY"

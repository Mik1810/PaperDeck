name: Discover classic papers

on:
  workflow_dispatch:
    inputs:
      per_query:
        description: "Maximum accepted Semantic Scholar candidates to inspect per query seed"
        required: false
        default: "5"
      max_new_per_query:
        description: "Maximum new classic papers to import per query"
        required: false
        default: "1"
      max_year:
        description: "Latest publication year eligible for classic discovery"
        required: false
        default: "2020"
      categories:
        description: "Optional area categories or labels to run, comma-separated (for example cs.DB,cs.OS)"
        required: false
        default: ""
      only:
        description: "Optional exact discovery query seed to run"
        required: false
        default: ""
      dry_run:
        description: "Inspect candidates without writing"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "23 5 1 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover-classics:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY || '' }}
      CLASSIC_DISCOVERY_PER_QUERY: ${{ github.event.inputs.per_query || vars.CLASSIC_DISCOVERY_PER_QUERY || '5' }}
      CLASSIC_DISCOVERY_MAX_NEW_PER_QUERY: ${{ github.event.inputs.max_new_per_query || vars.CLASSIC_DISCOVERY_MAX_NEW_PER_QUERY || '1' }}
      CLASSIC_DISCOVERY_MAX_YEAR: ${{ github.event.inputs.max_year || vars.CLASSIC_DISCOVERY_MAX_YEAR || '2020' }}
      CLASSIC_DISCOVERY_REQUEST_DELAY_MS: ${{ vars.CLASSIC_DISCOVERY_REQUEST_DELAY_MS || '1500' }}
      CLASSIC_DISCOVERY_RETRIES: ${{ vars.CLASSIC_DISCOVERY_RETRIES || '5' }}
      CLASSIC_DISCOVERY_RETRY_DELAY_MS: ${{ vars.CLASSIC_DISCOVERY_RETRY_DELAY_MS || '10000' }}
      CLASSIC_DISCOVERY_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      CLASSIC_DISCOVERY_CATEGORIES: ${{ github.event.inputs.categories || vars.CLASSIC_DISCOVERY_CATEGORIES || '' }}
      CLASSIC_DISCOVERY_ONLY: ${{ github.event.inputs.only || '' }}
      EMBEDDING_MODEL: ${{ vars.CLASSIC_DISCOVERY_EMBEDDING_MODEL || 'sentence-transformers/all-MiniLM-L6-v2' }}
      EMBEDDING_LIMIT: ${{ vars.CLASSIC_DISCOVERY_EMBEDDING_LIMIT || '96' }}
      EMBEDDING_TOPIC_LIMIT: ${{ vars.CLASSIC_DISCOVERY_TOPIC_EMBEDDING_LIMIT || '64' }}
      EMBEDDING_BATCH_SIZE: ${{ vars.EMBEDDING_BATCH_SIZE || '64' }}
      HF_HOME: /home/runner/.cache/huggingface

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Discover classic papers
        id: discover
        shell: bash
        run: |
          cmd=(
            npm run discover:classics
            --
            --per-query="$CLASSIC_DISCOVERY_PER_QUERY"
            --max-new-per-query="$CLASSIC_DISCOVERY_MAX_NEW_PER_QUERY"
            --max-year="$CLASSIC_DISCOVERY_MAX_YEAR"
          )

          if [ -n "$CLASSIC_DISCOVERY_ONLY" ]; then
            cmd+=(--only="$CLASSIC_DISCOVERY_ONLY")
          fi

          if [ -n "$CLASSIC_DISCOVERY_CATEGORIES" ]; then
            cmd+=(--categories="$CLASSIC_DISCOVERY_CATEGORIES")
          fi

          if [ "$CLASSIC_DISCOVERY_DRY_RUN" = "true" ]; then
            cmd+=(--dry-run)
          fi

          output=$("${cmd[@]}" 2>&1 | tee /dev/stderr | tail -1)
          echo "output=$output" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: env.CLASSIC_DISCOVERY_DRY_RUN != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-embeddings.txt

      - name: Cache HuggingFace models
        if: env.CLASSIC_DISCOVERY_DRY_RUN != 'true'
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-embedding-models-v2
          restore-keys: |
            ${{ runner.os }}-huggingface-

      - name: Install embedding dependencies
        if: env.CLASSIC_DISCOVERY_DRY_RUN != 'true'
        run: python -m pip install -r requirements-embeddings.txt

      - name: Embed newly eligible topics
        if: env.CLASSIC_DISCOVERY_DRY_RUN != 'true'
        run: |
          python scripts/embed_topics.py \
            --model "$EMBEDDING_MODEL" \
            --batch-size "$EMBEDDING_BATCH_SIZE" \
            --limit "$EMBEDDING_TOPIC_LIMIT" \
            --quiet

      - name: Embed newly eligible papers
        if: env.CLASSIC_DISCOVERY_DRY_RUN != 'true'
        run: |
          python scripts/embed_papers.py \
            --model "$EMBEDDING_MODEL" \
            --batch-size "$EMBEDDING_BATCH_SIZE" \
            --limit "$EMBEDDING_LIMIT" \
            --quiet

      - name: Summary
        if: always()
        shell: bash
        run: |
          mode="$([ "$CLASSIC_DISCOVERY_DRY_RUN" = "true" ] && echo "🔍 Dry run" || echo "📚 Discovery")"
          echo "## Classic Papers · $mode" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Per query:** $CLASSIC_DISCOVERY_PER_QUERY · **Max new:** $CLASSIC_DISCOVERY_MAX_NEW_PER_QUERY · **Max year:** $CLASSIC_DISCOVERY_MAX_YEAR" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$CLASSIC_DISCOVERY_ONLY" ]; then echo "**Only:** \`$CLASSIC_DISCOVERY_ONLY\`" >> "$GITHUB_STEP_SUMMARY"; fi
          if [ -n "$CLASSIC_DISCOVERY_CATEGORIES" ]; then echo "**Categories:** \`$CLASSIC_DISCOVERY_CATEGORIES\`" >> "$GITHUB_STEP_SUMMARY"; fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          output='${{ steps.discover.outputs.output }}'
          if [ -n "$output" ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d, indent=2))" 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "$output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Classic papers discovered via Semantic Scholar citation-based ranking._" >> "$GITHUB_STEP_SUMMARY"

name: Generate paper summaries

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider: cloudflare or gemini"
        required: false
        default: "cloudflare"
      model:
        description: "LLM model id"
        required: false
        default: "@cf/zai-org/glm-4.7-flash"
      limit:
        description: "Maximum papers to process"
        required: false
        default: "3"
      batch_size:
        description: "Papers per API batch"
        required: false
        default: "1"
      dry_run:
        description: "Count papers needing summaries without calling LLM"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "37 5 * * *"

jobs:
  generate-summaries:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LLM_PROVIDER: ${{ github.event.inputs.provider || vars.LLM_PROVIDER || 'cloudflare' }}
      LLM_MODEL: ${{ github.event.inputs.model || vars.LLM_MODEL || '@cf/zai-org/glm-4.7-flash' }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY || '' }}
      LLM_BATCH_SIZE: ${{ github.event.inputs.batch_size || vars.LLM_BATCH_SIZE || '1' }}
      LLM_LIMIT: ${{ github.event.inputs.limit || vars.LLM_LIMIT || '3' }}
      LLM_REQUEST_DELAY_MS: ${{ vars.LLM_REQUEST_DELAY_MS || '10000' }}
      LLM_RETRIES: ${{ vars.LLM_RETRIES || '5' }}
      LLM_MAX_OUTPUT_TOKENS: ${{ vars.LLM_MAX_OUTPUT_TOKENS || '3200' }}
      LLM_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID || '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_AUTH_TOKEN || '' }}
      JINA_API_KEY: ${{ secrets.JINA_API_KEY || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate summaries
        shell: bash
        run: |
          cmd=(npm run generate:summaries)

          if [ "$LLM_DRY_RUN" = "true" ]; then
            cmd+=(-- --dry-run)
          fi

          "${cmd[@]}"

name: Generate paper summaries

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider: github, cloudflare, or gemini"
        required: false
        default: "github"
      model:
        description: "LLM model id"
        required: false
        default: "openai/gpt-4o-mini"
      limit:
        description: "Maximum papers to process"
        required: false
        default: "50"
      batch_size:
        description: "Papers per API batch"
        required: false
        default: "3"
      dry_run:
        description: "Count papers needing summaries without calling LLM"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "37 5 * * *"

permissions:
  contents: read
  models: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-summaries:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LLM_PROVIDER: ${{ github.event.inputs.provider || vars.LLM_PROVIDER || 'github' }}
      LLM_MODEL: ${{ github.event.inputs.model || vars.LLM_MODEL || 'openai/gpt-4o-mini' }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY || '' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
      LLM_BATCH_SIZE: ${{ github.event.inputs.batch_size || vars.LLM_BATCH_SIZE || '3' }}
      LLM_LIMIT: ${{ github.event.inputs.limit || vars.LLM_LIMIT || '50' }}
      LLM_REQUEST_DELAY_MS: ${{ vars.LLM_REQUEST_DELAY_MS || '3000' }}
      LLM_RETRIES: ${{ vars.LLM_RETRIES || '5' }}
      LLM_SOURCE_TEXT_CHARS: ${{ vars.LLM_SOURCE_TEXT_CHARS || '8000' }}
      LLM_MAX_OUTPUT_TOKENS: ${{ vars.LLM_MAX_OUTPUT_TOKENS || '1600' }}
      LLM_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      GITHUB_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN || '' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID || '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_AUTH_TOKEN || '' }}
      JINA_API_KEY: ${{ secrets.JINA_API_KEY || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate summaries
        id: summaries
        shell: bash
        run: |
          cmd=(npm run generate:summaries)

          if [ "$LLM_DRY_RUN" = "true" ]; then
            cmd+=(-- --dry-run)
          fi

          output=$("${cmd[@]}" 2>&1 | tee /dev/stderr | tail -1)
          echo "output=$output" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        shell: bash
        run: |
          mode="$([ "$LLM_DRY_RUN" = "true" ] && echo "🔍 Dry run" || echo "🤖 Live")"
          echo "## LLM Summaries · $mode" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Provider:** \`$LLM_PROVIDER\` · **Model:** \`$LLM_MODEL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Limit:** $LLM_LIMIT · **Batch:** $LLM_BATCH_SIZE" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          output='${{ steps.summaries.outputs.output }}'
          if [ -n "$output" ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d, indent=2))" 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "$output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Triage summaries have 4 structured sections: why it matters, main contribution, prerequisites, read if you care about._" >> "$GITHUB_STEP_SUMMARY"

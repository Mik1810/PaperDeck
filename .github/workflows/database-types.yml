name: Database type check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  database-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check generated database types
        run: npm run db:types:check

name: Embed papers and topics

on:
  workflow_dispatch:
    inputs:
      topic_limit:
        description: "Maximum topics to embed in this run"
        required: false
        default: "256"
      limit:
        description: "Maximum papers to embed in this run"
        required: false
        default: "256"
      batch_size:
        description: "Embedding batch size"
        required: false
        default: "64"
      dry_run:
        description: "List candidates without loading the model or writing"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "47 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  embed-vectors:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'sentence-transformers/all-MiniLM-L6-v2' }}
      EMBEDDING_TOPIC_LIMIT: ${{ github.event.inputs.topic_limit || vars.EMBEDDING_TOPIC_LIMIT || '256' }}
      EMBEDDING_LIMIT: ${{ github.event.inputs.limit || vars.EMBEDDING_LIMIT || '256' }}
      EMBEDDING_BATCH_SIZE: ${{ github.event.inputs.batch_size || vars.EMBEDDING_BATCH_SIZE || '64' }}
      EMBEDDING_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      HF_HOME: /home/runner/.cache/huggingface

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-embeddings.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-embedding-models-v2
          restore-keys: |
            ${{ runner.os }}-huggingface-

      - name: Install embedding dependencies
        run: python -m pip install -r requirements-embeddings.txt

      - name: Embed topics
        id: embed-topics
        shell: bash
        run: |
          cmd=(
            python scripts/embed_topics.py
            --model "$EMBEDDING_MODEL"
            --batch-size "$EMBEDDING_BATCH_SIZE"
            --limit "$EMBEDDING_TOPIC_LIMIT"
            --quiet
          )

          if [ "$EMBEDDING_DRY_RUN" = "true" ]; then
            cmd+=(--dry-run)
          fi

          topics_out=$("${cmd[@]}" 2>&1 | tee /dev/stderr | tail -1)
          echo "topics_out=$topics_out" >> "$GITHUB_OUTPUT"

      - name: Embed papers
        id: embed-papers
        shell: bash
        run: |
          cmd=(
            python scripts/embed_papers.py
            --model "$EMBEDDING_MODEL"
            --batch-size "$EMBEDDING_BATCH_SIZE"
            --limit "$EMBEDDING_LIMIT"
            --quiet
          )

          if [ "$EMBEDDING_DRY_RUN" = "true" ]; then
            cmd+=(--dry-run)
          fi

          papers_out=$("${cmd[@]}" 2>&1 | tee /dev/stderr | tail -1)
          echo "papers_out=$papers_out" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        shell: bash
        run: |
          mode="$([ "$EMBEDDING_DRY_RUN" = "true" ] && echo "🔍 Dry run" || echo "📥 Write")"
          echo "## Embeddings · $mode" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Model:** \`$EMBEDDING_MODEL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          topics_out='${{ steps.embed-topics.outputs.topics_out }}'
          if [ -n "$topics_out" ]; then
            echo "### Topics" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$topics_out" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d, indent=2))" 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "$topics_out" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          papers_out='${{ steps.embed-papers.outputs.papers_out }}'
          if [ -n "$papers_out" ]; then
            echo "### Papers" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$papers_out" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d, indent=2))" 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "$papers_out" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Embeddings are 384-dim, stored in pgvector._" >> "$GITHUB_STEP_SUMMARY"

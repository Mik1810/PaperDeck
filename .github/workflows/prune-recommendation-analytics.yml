name: Prune recommendation analytics

on:
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Recommendation impression retention window in days"
        required: false
        default: "90"
      dry_run:
        description: "Count prunable impressions without deleting"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "11 5 * * 0"

permissions:
  contents: read

jobs:
  prune-recommendation-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RETENTION_DAYS: ${{ github.event.inputs.retention_days || vars.RECOMMENDATION_IMPRESSION_RETENTION_DAYS || '90' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prune recommendation impressions
        id: prune
        shell: bash
        run: |
          cmd=(npm run analytics:prune -- --days="$RETENTION_DAYS")

          if [ "$DRY_RUN" = "true" ]; then
            cmd+=(--dry-run)
          fi

          output=$("${cmd[@]}" 2>&1 | tee /dev/stderr | tail -1)
          echo "output=$output" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Recommendation analytics retention" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Retention:** $RETENTION_DAYS days" >> "$GITHUB_STEP_SUMMARY"
          echo "**Dry run:** $DRY_RUN" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          output='${{ steps.prune.outputs.output }}'
          if [ -n "$output" ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d, indent=2))" 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "$output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

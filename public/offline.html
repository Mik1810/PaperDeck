<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PaperDeck — Offline</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #334155;
    }
    .offline-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 32px;
      box-sizing: border-box;
      text-align: center;
    }
    .offline-icon {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
      border-radius: 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .offline-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0f172a;
      margin: 0 0 8px 0;
    }
    .offline-subtitle {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: #64748b;
      margin: 0 0 32px 0;
      max-width: 320px;
    }
    .offline-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #0d9488, #2563eb);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .offline-button:hover {
      opacity: 0.9;
    }
    .offline-button:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <img class="offline-icon" src="/apple-touch-icon.png" alt="PaperDeck" width="120" height="120">
    <h1 class="offline-title">You're offline</h1>
    <p class="offline-subtitle">Reconnect to browse papers, build your deck, and discover new research.</p>
    <button class="offline-button" onclick="location.reload()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Try again
    </button>
  </div>
</body>
</html>
